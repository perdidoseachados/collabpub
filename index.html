<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostalgia Pipeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Nostalgia Pipeline</h1>
      <p class="sub">Canal de reflexao TikTok</p>
      <form id="login-form">
        <label>Usuario
          <input type="text" id="login-user" required placeholder="seu nome">
        </label>
        <label>Senha
          <input type="password" id="login-pass" required placeholder="senha">
        </label>
        <button type="submit" class="btn-primary">Entrar</button>
        <p id="login-error" style="color:#f85149;margin-top:8px;display:none">Usuario ou senha incorretos</p>
      </form>
    </div>
  </div>

  <!-- APP (escondido ate login) -->
  <div id="app" class="hidden">
  <header>
    <h1>Nostalgia Pipeline</h1>
    <p class="sub">Canal de reflexao TikTok — <span id="user-name"></span> <a href="#" id="logout" style="color:#f85149;font-size:0.8em">[sair]</a></p>
    <div id="status-bar"></div>
  </header>

  <nav>
    <button class="tab active" data-tab="roteiros">Roteiros</button>
    <button class="tab" data-tab="criar">+ Novo</button>
    <button class="tab" data-tab="calendario">Calendario</button>
  </nav>

  <!-- ROTEIROS -->
  <section id="roteiros" class="panel active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Buscar roteiros..." autocomplete="off">
    </div>
    <div class="filters">
      <button class="filter active" data-status="todos">Todos</button>
      <button class="filter" data-status="rascunho">Rascunho</button>
      <button class="filter" data-status="polimento">Polimento</button>
      <button class="filter" data-status="aprovado">Aprovado</button>
      <button class="filter" data-status="em producao">Em Producao</button>
      <button class="filter" data-status="publicado">Publicado</button>
      <button class="filter" data-status="negado">Negado</button>
      <button class="filter" data-status="repescagem">Repescagem</button>
    </div>
    <div id="roteiros-list"></div>
  </section>

  <!-- CRIAR -->
  <section id="criar" class="panel">
    <h2>Novo Roteiro</h2>
    <form id="form-roteiro">
      <div class="form-grid">

        <div class="form-box">
          <div class="box-header">Titulo</div>
          <input type="text" name="titulo" required placeholder="Ex: Internet discada">
        </div>

        <div class="form-box full">
          <div class="box-header">Texto / Reflexao</div>
          <textarea name="texto" rows="4" placeholder="O texto que aparece no video..."></textarea>
        </div>

        <div class="form-box full">
          <div class="box-header">Descricao Visual</div>
          <textarea name="visual" rows="2" placeholder="Computador bege, Windows 98, modem..."></textarea>
        </div>

        <div class="form-box full">
          <div class="box-header">Pergunta Final</div>
          <input type="text" name="pergunta" placeholder="O que perdeu valor na sua vida...?">
        </div>

        <div class="form-box">
          <div class="box-header">Duracao (s)</div>
          <input type="number" name="duracao" value="20" min="5" max="60">
        </div>

        <div class="form-box">
          <div class="box-header">Formato</div>
          <select name="formato">
            <option value="slideshow">Slideshow (video)</option>
            <option value="carrossel">Carrossel (fotos)</option>
          </select>
        </div>

        <div class="form-box">
          <div class="box-header">Plataforma</div>
          <select name="plataforma">
            <option value="tiktok">TikTok</option>
            <option value="instagram">Instagram</option>
            <option value="ambos">Ambos</option>
          </select>
        </div>

        <div class="form-box">
          <div class="box-header">Classificacao</div>
          <div class="star-picker" data-name="rating">
            <span class="star" data-val="1">&#9734;</span>
            <span class="star" data-val="2">&#9734;</span>
            <span class="star" data-val="3">&#9734;</span>
            <span class="star" data-val="4">&#9734;</span>
            <span class="star" data-val="5">&#9734;</span>
          </div>
          <input type="hidden" name="rating" value="0">
        </div>

      </div>
      <button type="submit" class="btn-primary" style="margin-top:16px">Salvar Rascunho</button>
    </form>
  </section>

  <!-- CALENDARIO -->
  <section id="calendario" class="panel">
    <h2>Agendamentos</h2>
    <div id="cal-list"></div>
  </section>

  <!-- MODAL EDITAR -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-titulo"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  </div><!-- fim #app -->

  <script src="app.js"></script>
</body>
</html>
